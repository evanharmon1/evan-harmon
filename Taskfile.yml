# Taskfile for Evan Harmon Website
version: '3'
tasks:
  boostrap:
    cmds:
      - /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      - brew install python #TODO: Might need to use a non-homebrew method
    silent: true
  install:
    cmds:
      - brew bundle --file=Brewfile
      - python install -r requirements.txt
    silent: true
  validate:
    cmds:
      - task: preCommit
      - task: check
    silent: true
  preCommit:
    cmds:
      - pre-commit run --all-files
    silent: true
  check:
    cmds:
      - pnpm run check:astro
      - pnpm run check:eslint
      - cmd: pnpm run check:prettier
        ignore_error: true
    silent: true
  fix:
    cmds:
      - pnpm run fix
    silent: true
  lint:design:
    desc: Validate the Almanac design system (canonical files, semantic tokens, token contrast)
    cmds:
      # 1) canonical sources must exist
      - test -f DESIGN.md || (echo "✗ DESIGN.md missing (AI-facing design intent)" && exit 1)
      - test -f src/styles/global.css || (echo "✗ src/styles/global.css missing (runtime tokens)" && exit 1)
      # 2) semantic tokens only — flag one-off Tailwind numbered colour utilities
      #    (e.g. text-blue-600, bg-slate-50). These are the off-palette "AI-slop" tell.
      #    Fixed foil/ink hex values sanctioned by DESIGN.md §2.3 are allowed.
      - >-
        ! grep -rEn "(bg|text|border|fill|ring|from|to|via)-(red|orange|amber|yellow|lime|green|emerald|teal|cyan|sky|blue|indigo|violet|purple|fuchsia|pink|rose|slate|gray|grey|zinc|neutral|stone)-[0-9]{2,3}"
        src/components src/pages src/layouts
        || (echo "✗ off-palette Tailwind colour utility found — use semantic tokens (bg-paper, text-accent, …)" && exit 1)
      # 3) STATIC token contrast — prove the palette's fg/bg pairs meet WCAG AA in
      #    both themes. (Necessary but NOT sufficient: it can't see runtime overrides,
      #    so rendered contrast must also be measured on the running pages — see the
      #    design-handoff skill's verification step.)
      - node test/check-contrast.mjs
      - echo "✓ design lint passed"
      # NOTE: no export:design / Style-Dictionary step — this is a web-only handoff with a single
      # CSS-first token source (global.css). Promote to DTCG only if a 2nd platform/brand appears.
      - pnpm build
    silent: false
  security:
    cmds:
      - task: secrets
      - task: sast
    ignore_error: true
    silent: true
  secrets:
    cmds:
      - ./check_for_pattern.sh . "*secret*"
      - whispers --config test/whisperConfig.yml --severity BLOCKER,CRITICAL .
    silent: true
  sast:
    cmds:
      - task: sast-dependencies
      - task: sast-code
    silent: true
  sast-dependencies:
    cmds:
      - snyk test --all-projects
    silent: true
  sast-code:
    cmds:
      - snyk code test
    silent: true
  ghReleaseInit:
    cmds:
      - git add .
      - git commit -m 'Initial release v0.0.1'
      - git tag -a v0.0.1 -m "Initial release v0.0.1"
      - git push origin main
      - git push origin --tags
      - gh release create
    silent: false
  vBumpPatch:
    desc: Bump to the next patch version
    vars:
      LATEST_TAG:
        sh: git tag --sort=-version:refname | head -n1
      VERSION:
        sh: echo "{{.LATEST_TAG}}" | sed 's/^v//'
      MAJOR:
        sh: echo "{{.VERSION}}" | cut -d. -f1
      MINOR:
        sh: echo "{{.VERSION}}" | cut -d. -f2
      PATCH:
        sh: echo "{{.VERSION}}" | cut -d. -f3
      NEW_PATCH:
        sh: expr {{.PATCH}} + 1
      NEW_VERSION: v{{.MAJOR}}.{{.MINOR}}.{{.NEW_PATCH}}
    cmds:
      - echo "Latest tag is {{.LATEST_TAG}}"
      - echo "Current version is {{.VERSION}}"
      - echo "Bumping patch version to {{.NEW_VERSION}}"
      - git tag {{.NEW_VERSION}}
      - git push origin {{.NEW_VERSION}}
      - gh release create
  vBumpMinor:
    desc: Bump to the next minor version
    vars:
      LATEST_TAG:
        sh: git tag --sort=-version:refname | head -n1
      VERSION:
        sh: echo "{{.LATEST_TAG}}" | sed 's/^v//'
      MAJOR:
        sh: echo "{{.VERSION}}" | cut -d. -f1
      MINOR:
        sh: echo "{{.VERSION}}" | cut -d. -f2
      NEW_MINOR:
        sh: expr {{.MINOR}} + 1
      NEW_VERSION: v{{.MAJOR}}.{{.NEW_MINOR}}.0
    cmds:
      - echo "Latest tag is {{.LATEST_TAG}}"
      - echo "Current version is {{.VERSION}}"
      - echo "Bumping minor version to {{.NEW_VERSION}}"
      - git tag {{.NEW_VERSION}}
      - git push origin {{.NEW_VERSION}}
      - gh release create {{.NEW_VERSION}} --generate-notes
  vBumpMajor:
    desc: Bump to the next major version
    vars:
      LATEST_TAG:
        sh: git tag --sort=-version:refname | head -n1
      VERSION:
        sh: echo "{{.LATEST_TAG}}" | sed 's/^v//'
      MAJOR:
        sh: echo "{{.VERSION}}" | cut -d. -f1
      NEW_MAJOR:
        sh: expr {{.MAJOR}} + 1
      NEW_VERSION: v{{.NEW_MAJOR}}.0.0
    cmds:
      - echo "Latest tag is {{.LATEST_TAG}}"
      - echo "Current version is {{.VERSION}}"
      - echo "Bumping major version to {{.NEW_VERSION}}"
      - git tag {{.NEW_VERSION}}
      - git push origin {{.NEW_VERSION}}
      - gh release create
  bunchAdd:
    cmds:
      - mv '.meta/Code Project - Evan Harmon Website.bunch' '/Users/evan/Library/Mobile Documents/com~apple~CloudDocs/Bunches/'
      - ln -s '/Users/evan/Library/Mobile Documents/com~apple~CloudDocs/Bunches/Code Project - Evan Harmon Website.bunch' .meta
    silent: false
  obsidianAdd:
    cmds:
      - mv '.meta/Evan Harmon Website.md' '/Users/evan/Local/Memex/Personal/Digital'
      - ln -s '/Users/evan/Local/Memex/Personal/Digital/Evan Harmon Website.md' .meta
    silent: false
