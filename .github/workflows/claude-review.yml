name: Claude Review
run-name: ${{ github.actor }} is running Claude Review
# Requires: CLAUDE_CODE_OAUTH_TOKEN secret, plus the CI GitHub App
# (CI_APP_CLIENT_ID variable + CI_APP_PRIVATE_KEY secret). See docs/CHECKLIST.md
# and docs/architecture/security.md.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [labeled]
jobs:
  review:
    if: >-
      (github.event.issue.pull_request != null ||
       github.event_name == 'pull_request_review_comment' ||
       github.event_name == 'pull_request_review' ||
       github.event_name == 'pull_request') &&
      (contains(github.event.comment.body, '@claude review') ||
       contains(github.event.review.body, '@claude review') ||
       (github.event.action == 'labeled' &&
        github.event.label.name == 'claude-review'))
    runs-on: [ "ubuntu-latest" ]
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          # Least-privilege token: review only comments (issues/pull-requests)
          # and reads the repo (no push). members:read is gated to org repos —
          # it backs the org-membership sender check; personal repos lack it
          # and requesting it would fail token minting.
          permission-contents: read
          permission-pull-requests: write
          permission-issues: write
      - name: Verify sender is authorized
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SENDER: ${{ github.event.sender.login }}
        run: |
          if [ "$SENDER" = "evanharmon1-bot" ] || \
             [ "$SENDER" = "renovate[bot]" ] || \
             [ "$SENDER" = "coderabbitai[bot]" ] || \
             [ "$SENDER" = "dependabot[bot]" ]; then
            echo "Bot $SENDER allowed"
            exit 0
          fi
          if [ "$SENDER" = "evanharmon1" ]; then
            echo "$SENDER is the repo owner"
          else
            echo "::error::$SENDER is not authorized"
            exit 1
          fi
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: anthropics/claude-code-action@d5726de019ec4498aa667642bc3a80fca83aa102 # v1.0.148
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          trigger_phrase: "@claude review"
          label_trigger: "claude-review"
          track_progress: true
          use_sticky_comment: true
          allowed_bots: "renovate[bot],coderabbitai[bot],dependabot[bot]"
          base_branch: main
          branch_prefix: claude/
          # --max-budget-usd caps API-key spend; likely a no-op under
          # CLAUDE_CODE_OAUTH_TOKEN (subscription) billing. Real runaway guards
          # are timeout-minutes (job-level) and --max-turns.
          claude_args: "--model opus --effort max --max-budget-usd 6 --disallowedTools Edit Write Bash --max-turns 60"
          prompt: |
            Review the PR diff and post a code review comment. Flag security,
            correctness, and convention concerns (see AGENTS.md). Do not write
            code or modify files.
