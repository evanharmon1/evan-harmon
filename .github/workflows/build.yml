name: Build & Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
  workflow_dispatch:

# Parallel jobs that all call into the Taskfile so local + CI run identical commands.
# A final `verify` job aggregates statuses for branch protection
# (required checks: verify + security). Every job's toolchain setup goes through
# the shared ./.github/actions/setup composite action.

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    # Runner switch: CI_RUNS_ON repo/org variable unset -> the rendered
    # default; set it to a JSON runner spec to override without a commit.
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '"ubuntu-latest"') }}
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          lint-tools: "true"
      - name: Lint + typecheck
        run: task check
      - run: task test:tasks
      - run: task test:release-title
      - run: task foreman:test
      - name: Skills drift check (vendored skills vs pinned harmon-devkit ref)
        run: task verify:skills
      - run: task test:hooks
      - run: task test:devcontainer:permissions

  build-test:
    # Runner switch: CI_RUNS_ON repo/org variable unset -> the rendered
    # default; set it to a JSON runner spec to override without a commit.
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '"ubuntu-latest"') }}
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Install lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --version
          fail: false
      - name: Build
        run: task build
      - name: Validate
        run: task validate
      - name: Test
        run: task test

  security:
    # Runner switch: CI_RUNS_ON repo/org variable unset -> the rendered
    # default; set it to a JSON runner spec to override without a commit.
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '"ubuntu-latest"') }}
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          gitleaks: "true"
      - name: Secrets scan
        run: task security:secrets
      - name: Dependency audit
        run: task security:audit
      - name: SAST (Semgrep Community Edition)
        if: github.event.repository.private && vars.FULL_SECURITY_SCAN != 'true'
        run: task security:sast

  lighthouse:
    # Runner switch: CI_RUNS_ON repo/org variable unset -> the rendered
    # default; set it to a JSON runner spec to override without a commit.
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '"ubuntu-latest"') }}
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Install Chrome (required for Lighthouse)
        uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce # v1.7.3
        id: setup-chrome
        with:
          # Hosted runners need apt (via sudo) to install Chrome's shared libs;
          # persistent self-hosted machines already have them, so skip apt/sudo
          # there to avoid requiring passwordless sudo.
          install-dependencies: ${{ runner.environment == 'github-hosted' }}
          no-sudo: ${{ runner.environment != 'github-hosted' }}
      - name: Build
        run: task build
      - name: Lighthouse CI
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        id: lighthouse
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
      - name: Comment Lighthouse results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          LHCI_LINKS: ${{ steps.lighthouse.outputs.links }}
          LHCI_RESULTS_PATH: ${{ steps.lighthouse.outputs.resultspath }}
        with:
          script: |
            const fs = require('fs')
            const path = require('path')
            const links = JSON.parse(process.env.LHCI_LINKS || '{}')
            const manifestPath = path.join(process.env.LHCI_RESULTS_PATH, 'manifest.json')
            const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'))
            const fmt = v => (v == null ? 'n/a' : Math.round(v * 100))
            const rows = manifest
              .filter(r => r.isRepresentativeRun)
              .map(r => {
                const s = r.summary
                const link = links[r.url] || ''
                const urlPath = r.url.replace('http://localhost', '') || '/'
                return `| \`${urlPath}\` | ${fmt(s.performance)} | ${fmt(s.accessibility)} | ${fmt(s['best-practices'])} | ${fmt(s.seo)} | [report](${link}) |`
              })
              .join('\n')
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const body = [
              '## Lighthouse CI Results',
              '',
              '| URL | Perf | A11y | BP | SEO | Report |',
              '|---|---|---|---|---|---|',
              rows,
              '',
              `_Run: [${context.runId}](${runUrl})_`,
            ].join('\n')
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('## Lighthouse CI Results')
            )
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              })
            }

  a11y:
    # Accessibility (axe-core via Playwright). NON-BLOCKING for now: intentionally
    # NOT in the `verify` needs list, so it reports but does not gate merges.
    # Self-activates once the app ships a playwright.config.* (before then
    # `task test:a11y` skips). To promote to a required check: add `a11y` to
    # verify.needs + a `check a11y` line, and to the ruleset's required checks.
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '"ubuntu-latest"') }}
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Detect Playwright config
        id: pw
        run: |
          if find . -maxdepth 1 -name 'playwright.config.*' 2>/dev/null | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Playwright browsers
        if: steps.pw.outputs.present == 'true'
        run: pnpm exec playwright install --with-deps chromium
      - name: Build site for accessibility tests
        if: steps.pw.outputs.present == 'true'
        run: task build
      - name: Accessibility (axe) tests
        run: task test:a11y

  verify:
    if: always()
    needs: [lint, security, build-test, lighthouse]
    # Runner switch: CI_RUNS_ON repo/org variable unset -> the rendered
    # default; set it to a JSON runner spec to override without a commit.
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '"ubuntu-latest"') }}
    env:
      IS_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    steps:
      # Never check out or run fork-controlled repository code on this path.
      - name: Verify deliberate skips at the untrusted-fork boundary
        if: env.IS_FORK == 'true'
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
          BUILD_TEST_RESULT: ${{ needs.build-test.result }}
          LIGHTHOUSE_RESULT: ${{ needs.lighthouse.result }}
        run: |
          fail=0
          check_skipped() {
            if [ "$2" != "skipped" ]; then
              echo "Job $1 result: $2 (expected skipped for an untrusted fork)"
              fail=1
            fi
          }
          check_skipped lint "$LINT_RESULT"
          check_skipped security "$SECURITY_RESULT"
          check_skipped build-test "$BUILD_TEST_RESULT"
          check_skipped lighthouse "$LIGHTHOUSE_RESULT"
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "Untrusted fork trust boundary enforced: all repository-controlled jobs were deliberately skipped."
      - if: env.IS_FORK != 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Verify required jobs succeeded
        if: env.IS_FORK != 'true'
        env:
          EXPECTED_RESULT: success
          LINT_RESULT: ${{ needs.lint.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
          BUILD_TEST_RESULT: ${{ needs.build-test.result }}
          LIGHTHOUSE_RESULT: ${{ needs.lighthouse.result }}
        run: ./scripts/verify-required-results.sh "lint=${LINT_RESULT}" "security=${SECURITY_RESULT}" "build-test=${BUILD_TEST_RESULT}" "lighthouse=${LIGHTHOUSE_RESULT}"
