name: CodeQL
run-name: ${{ github.actor }} is running CodeQL Analysis
on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
  schedule:
    - cron: "0 6 * * 1"

# Public repositories run CodeQL automatically. For a private/internal repo,
# FULL_SECURITY_SCAN=true means the owner has deliberately enabled paid GitHub
# Code Security. Free private repos use Semgrep CE in build.yml instead.

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    if: >-
      (github.event.repository.private == false || vars.FULL_SECURITY_SCAN == 'true') &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    # Runner switch: CI_RUNS_ON repo/org variable unset -> the rendered
    # default; set it to a JSON runner spec to override without a commit.
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '"ubuntu-latest"') }}
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - python
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: /language:${{ matrix.language }}

  # Stable aggregate status (the matrixed analyze jobs have dynamic names).
  # Named codeql-verify so it does not collide with the build workflow's
  # required `verify` check. It always reports: public/paid scans must succeed;
  # free private and fork-PR scans report a successful not-applicable gate.
  codeql-verify:
    if: always()
    needs: [analyze]
    # Runner switch: CI_RUNS_ON repo/org variable unset -> the rendered
    # default; set it to a JSON runner spec to override without a commit.
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '"ubuntu-latest"') }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        with:
          persist-credentials: false
      - name: Check analyze result
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          FULL_SECURITY_SCAN: ${{ github.event.repository.private == false && 'true' || vars.FULL_SECURITY_SCAN }}
          IS_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
          ANALYZE_RESULT: ${{ needs.analyze.result }}
        run: ./scripts/verify-codeql-result.sh
      # Never check out or execute fork-controlled repository code on the
      # aggregate runner. The workflow-defined fork diagnostic stays inline.
      - name: Check deliberate fork skip
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository
        env:
          FULL_SECURITY_SCAN: ${{ github.event.repository.private == false && 'true' || vars.FULL_SECURITY_SCAN }}
          ANALYZE_RESULT: ${{ needs.analyze.result }}
        run: |
          scan="${FULL_SECURITY_SCAN:-false}"
          case "$scan" in
            true | false) ;;
            *)
              echo "Invalid FULL_SECURITY_SCAN value: $scan"
              exit 1
              ;;
          esac
          if [ "$ANALYZE_RESULT" != "skipped" ]; then
            echo "CodeQL analyze result on fork: $ANALYZE_RESULT (expected skipped)"
            exit 1
          fi
          echo "CodeQL analyze deliberately skipped for an untrusted fork."
