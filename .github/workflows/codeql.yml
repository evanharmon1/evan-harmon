name: CodeQL
run-name: ${{ github.actor }} is running CodeQL Analysis
on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"

# Opt-in via the FULL_SECURITY_SCAN repository variable (see docs/CHECKLIST.md).

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    if: >-
      vars.FULL_SECURITY_SCAN == 'true' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    # Runner switch: CI_RUNS_ON repo/org variable unset -> the rendered
    # default; set it to a JSON runner spec to override without a commit.
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '"ubuntu-latest"') }}
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
      - name: Perform CodeQL Analysis
        continue-on-error: true
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: /language:${{ matrix.language }}

  # Stable aggregate status (the matrixed analyze jobs have dynamic names and
  # are skipped unless FULL_SECURITY_SCAN is set). Named codeql-verify so it
  # does not collide with the build workflow's required `verify` check.
  codeql-verify:
    if: always()
    needs: [analyze]
    # Runner switch: CI_RUNS_ON repo/org variable unset -> the rendered
    # default; set it to a JSON runner spec to override without a commit.
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '"ubuntu-latest"') }}
    steps:
      - name: Check analyze result
        run: |
          result="${{ needs.analyze.result }}"
          if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
            echo "CodeQL analyze result: $result"
            exit 1
          fi
          echo "CodeQL analyze: $result"
