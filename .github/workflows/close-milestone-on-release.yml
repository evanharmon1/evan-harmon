name: Close milestone on release
# When a release is published, close the open milestone whose title matches the
# tag — we name milestones after release versions (see docs/project-management.md).
# Same-repo edit, so the default GITHUB_TOKEN with issues:write is enough; no-op
# when no milestone matches, so it's safe on every release.
on:
  release:
    types: [published]

permissions:
  issues: write

jobs:
  close-milestone:
    name: Close matching milestone
    # Runner switch: CI_RUNS_ON repo/org variable unset -> the rendered
    # default; set it to a JSON runner spec to override without a commit.
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '"ubuntu-latest"') }}
    timeout-minutes: 10
    steps:
      - name: Close the milestone named after the tag
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          number=$(gh api "repos/$REPO/milestones?state=open" --paginate |
            jq -r --arg t "$TAG" '.[] | select(.title == $t) | .number' | head -n1)
          if [ -n "$number" ]; then
            gh api --method PATCH "repos/$REPO/milestones/$number" -f state=closed >/dev/null
            echo "Closed milestone #$number matching $TAG"
          else
            echo "No open milestone titled $TAG — nothing to close"
          fi
