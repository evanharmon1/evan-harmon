[build]
  publish = "dist"
  command = "pnpm build"
[build.environment]
  # Astro 6 + engines ">= 21"; Netlify auto-detects pnpm from pnpm-lock.yaml.
  NODE_VERSION = "22"
  # Netlify auto-runs `pip install -r requirements.txt` (whispers, for CI secret
  # scanning — not needed for the build). Pin Python to a version with a prebuilt
  # `jellyfish` wheel so pip doesn't try to compile it from Rust source (no Cargo
  # on the build image). 3.14 (the image default) has no wheel.
  PYTHON_VERSION = "3.12"
[build.processing.html]
  pretty_urls = false
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[redirects]]
  from = "https://evanharmon.com/memex/*"
  to = "https://publish.obsidian.md/serve?url=evanharmon.com/memex/:splat"
  status = 200
  force = true
