# pnpm build-script approvals + version pins. pnpm 10+ blocks dependency build
# scripts by default. `allowBuilds` (a map) is the pnpm 11+ approval setting —
# it replaced pnpm 10's `onlyBuiltDependencies` list, so this file requires
# pnpm 11+. List the packages whose build scripts must run here (NOT the
# package.json `pnpm` field — pnpm 10+ ignores that).
allowBuilds:
  esbuild: true
  sharp: true
  # workerd (the Cloudflare Workers runtime) is pulled in by wrangler at deploy
  # time; approve its build or `wrangler deploy` fails ERR_PNPM_IGNORED_BUILDS.
  workerd: true

# Security floor: esbuild <0.28.1 allows arbitrary file reads via the dev server
# on Windows (GHSA; pnpm audit + Snyk). Astro/Vite still resolve 0.27.x — force
# the patched line until they catch up.
overrides:
  esbuild: '>=0.28.1'
  # sharp <0.35.0 inherits libvips vulnerabilities (pnpm audit high). Astro
  # still resolves 0.34.x — force the patched line until it catches up.
  sharp: '>=0.35.0'

# Local customization (not from the harmon-init template): expose Astro's
# transitive deps at the root node_modules so direct imports like
# `@astrojs/markdown-remark` (used in src/utils/frontmatter.ts) resolve. This
# replaces the old `.npmrc` `shamefully-hoist=true` — pnpm 10+ reads hoisting
# settings only from pnpm-workspace.yaml, not `.npmrc`.
shamefullyHoist: true
# pnpm 11 defaults minimumReleaseAge to 1440 (1 day) — freshly published
# versions won't resolve until they age. To install a pinned release younger
# than that, add version-pinned entries here (they become harmless no-ops once
# the version ages past the cooldown):
# minimumReleaseAgeExclude:
#   - some-package@1.2.3
