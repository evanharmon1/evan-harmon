---
# CodeRabbit configuration
# Docs:   https://docs.coderabbit.ai/reference/configuration
# Schema: https://coderabbit.ai/integrations/schema.v2.json

language: en-US

tone_instructions: >-
  Be concise and practical. Prioritize security and correctness.
  My personal website

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  collapse_walkthrough: true
  changed_files_summary: true
  assess_linked_issues: true

  auto_review:
    enabled: true
    drafts: false
    # Also auto-review stacked PRs — ones whose base is a feature branch rather
    # than main — so each slice of a PR stack gets reviewed before the stack
    # starts merging. Regex list; the default branch is always included.
    base_branches:
      - "feat/.*"
    ignore_usernames:
      - renovate[bot]
      - dependabot[bot]

  path_instructions:
    - path: "**"
      instructions: >-
        Enforce Conventional Commits. Trunk-based development: PRs target
        main. Never suggest bypassing git hooks with --no-verify; fix the
        underlying issue. `task verify` must pass before merge — flag changes
        that would break it.

    - path: "Taskfile.yml"
      instructions: >-
        Keep lint/build/validate/test targets parallel-safe. `task verify`
        is the merge gate.

    - path: ".github/workflows/**"
      instructions: >-
        Workflows should call `task` targets rather than re-implement logic,
        so local + CI stay identical. Pin third-party actions by commit SHA
        with a trailing version comment. Use Renovate datasource comments for
        tool versions. Apply least-privilege permissions. Never log secrets.

    - path: "lefthook.yml"
      instructions: >-
        Git hooks are orchestrated via lefthook (not pre-commit) and must
        delegate to Taskfile tasks so CI, local hooks, and manual runs
        execute identical commands. Do not duplicate command logic here.

chat:
  auto_reply: true
