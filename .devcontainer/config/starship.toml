"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](color_orange)\
$os\
$username\
[](bg:color_yellow fg:color_orange)\
$directory\
[](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[](fg:color_aqua bg:color_blue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$dotnet\
$kotlin\
$haskell\
$python\
$ruby\
[](fg:color_blue bg:color_bg3)\
${custom.ansible}\
$docker_context\
$kubernetes\
$helm\
$terraform\
$aws\
$gcloud\
$conda\
$pixi\
[ ](fg:color_bg1)\
$line_break$character"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[os]
disabled = false
style = "bg:color_orange fg:color_fg0"

[os.symbols]
Windows = "َ°چ²"
Ubuntu = "َ°•ˆ"
SUSE = ""
Raspbian = "َ°گ؟"
Mint = "َ°£­"
Macos = "َ°€µ"
Manjaro = ""
Linux = "َ°Œ½"
Gentoo = "َ°£¨"
Fedora = "َ°£›"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "َ°£‡"
Artix = "َ°£‡"
EndeavourOS = ""
CentOS = ""
Debian = "َ°£ڑ"
Redhat = "َ±„›"
RedHatEnterprise = "َ±„›"
Pop = ""

[username]
show_always = true
style_user = "bg:color_orange fg:color_fg0"
style_root = "bg:color_orange fg:color_fg0"
format = '[ $user ]($style)'

[hostname]
disabled = false
ssh_only = true
trim_at = "."
format = "[$hostname]($style) in "
style = "green dimmed bold"

[directory]
style = "fg:color_fg0 bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 0
truncation_symbol = ".../"
truncate_to_repo = false
home_symbol = "~"

[directory.substitutions]
"Documents" = "َ°ˆ™ "
"Downloads" = " "
"Music" = "َ°‌ڑ "
"Pictures" = " "
"Developer" = "َ°²‹ "

[git_branch]
symbol = ""
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'
ahead = "â‡،${count}"
behind = "â‡£${count}"
diverged = "â‡•â‡،${ahead_count}â‡£${behind_count}"
untracked = "?${count}"
stashed = "ًں“¦${count}"
modified = "âœڑ${count}"
staged = "âœ”${count}"
renamed = "آ»${count}"
deleted = "âœک${count}"
conflicted = "âڑ”${count}"
disabled = false

[nodejs]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[c]
symbol = " "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[cpp]
symbol = " "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[rust]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[golang]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[php]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[java]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[dotnet]
disabled = false
format = "[$symbol$version( ًںژ¯ $tfm)]($style) "
symbol = "â€¢NET "
style = "blue bold"
heuristic = true

[kotlin]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[haskell]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[python]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[ruby]
disabled = false
format = "via [$symbol$version]($style) "
symbol = " "
style = "bold red"

[docker_context]
symbol = ""
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:#83a598 bg:color_bg3)]($style)'

[terraform]
disabled = false
format = "via [$symbol$workspace]($style) "
symbol = "ï°‰ "
style = "bold 105"

[custom.ansible]
format = "[َ±‚ڑ ]($style)"
style = "fg:color_fg0 bg:color_bg3"
detect_files = ["ansible.cfg", "site.yml", "site.yaml", "playbook.yml", "playbook.yaml"]
detect_folders = ["roles", "group_vars", "host_vars"]

[gcloud]
disabled = true
format = "on [ًںژ¯ $project( $account)](dimmed yellow) "
style = "bold yellow"

[aws]
disabled = true
format = "via [âکپï¸ڈ $profile( $region)](dimmed yellow) "
style = "bold yellow"

[kubernetes]
disabled = true
format = "on [â›µ $context\\($namespace\\)](dimmed green) "
symbol = "â›µ "
context_aliases = { "prod-cluster" = "prod", "dev-cluster" = "dev" }

[helm]
disabled = false
format = "via [$symbol$version]($style) "
symbol = "âژˆ "
style = "bold white"

[conda]
style = "bg:color_bg3"
format = '[[ $symbol( $environment) ](fg:#83a598 bg:color_bg3)]($style)'

[pixi]
style = "bg:color_bg3"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

[time]
disabled = true
time_format = "%R"
style = "bg:color_bg1"
format = '[[  $time ](fg:color_fg0 bg:color_bg1)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](bold fg:color_green)'
error_symbol = '[](bold fg:color_red)'
vimcmd_symbol = '[](bold fg:color_green)'
vimcmd_replace_one_symbol = '[](bold fg:color_purple)'
vimcmd_replace_symbol = '[](bold fg:color_purple)'
vimcmd_visual_symbol = '[](bold fg:color_yellow)'
