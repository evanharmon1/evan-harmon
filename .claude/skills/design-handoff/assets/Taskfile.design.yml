# Taskfile.design.yml — design-handoff tasks (go-task / https://taskfile.dev)
#
# The design-handoff skill merges these into the TARGET repo's Taskfile.yml when they're
# missing. They assume:
#   - check-contrast.mjs, check-off-palette.sh, and ingest-design.sh have been copied
#     into the target repo at scripts/ (chmod +x the .sh files)
#   - the canonical tokens live in src/styles/globals.css
# Adjust the vars below if the repo differs. If the repo already has `verify`/`check`, add
# `lint:design` to its deps instead of using the aggregator at the bottom (see the comment).

version: "3"

vars:
  GLOBALS: src/styles/globals.css
  CONTRAST_SCRIPT: scripts/check-contrast.mjs
  OFF_PALETTE_SCRIPT: scripts/check-off-palette.sh
  INGEST_SCRIPT: scripts/ingest-design.sh

tasks:
  lint:design:
    desc: Static design gate — WCAG-AA token contrast (both themes) + off-palette scan
    cmds:
      # 1. Static contrast: parses globals.css, fails on any sub-AA text pair in
      #    :root or .dark — including the auto-discovered `-text` status roles.
      - node {{.CONTRAST_SCRIPT}} {{.GLOBALS}}
      # 2. Off-palette guard: components must style with semantic tokens, never
      #    arbitrary color literals. Lives in a script (not an inline grep) so it's
      #    shellcheck-covered and keeps this cmds: entry trivial.
      - ./{{.OFF_PALETTE_SCRIPT}} src

  ingest:design:
    desc: Safely extract a Claude Design handoff (.tar.gz or .zip) into specs/
    requires:
      vars: [BUNDLE]
    # BUNDLE/DEST reach the script through the ENVIRONMENT, never spliced into
    # shell source: an interpolated `tar -xf {{.BUNDLE}}` would execute a crafted
    # value like `x.tar.gz; rm -rf ~` and break on paths with spaces. The script
    # picks tar vs unzip by validated extension and rejects unsafe archive
    # entries (absolute paths, ../ traversal, links) before extracting.
    env:
      BUNDLE: "{{.BUNDLE}}"
      DEST: '{{.DEST | default "specs"}}'
    cmds:
      - ./{{.INGEST_SCRIPT}}

  verify:browsers:
    desc: Cross-browser/viewport screenshot sweep (Playwright — Chromium/Firefox/WebKit × devices)
    # Requires @playwright/test and `npx playwright install` (the skill provisions both if missing),
    # plus a baseURL/webServer in playwright.config.ts (copy the bundled assets/playwright.config.ts).
    # Runs the bundled brand-screenshots.spec.ts —
    # the route × theme × engine/device sweep that captures the Phase 5 matrix. Scoped to the spec
    # file so it doesn't re-run the repo's whole e2e suite.
    cmds:
      - npx playwright test tests/brand-screenshots.spec.ts {{.CLI_ARGS}}

  verify:contrast:
    desc: Rendered WCAG contrast — computed colors on real pages, both themes (Phase 5)
    # Requires a running dev/preview server (the script defaults to http://localhost:4321;
    # pass another base URL via `-- <url>`). Uses the bundled measure-rendered-contrast.mjs
    # copied into scripts/ with its SAMPLES table filled in for this repo.
    cmds:
      - node scripts/measure-rendered-contrast.mjs {{.CLI_ARGS}}

  # Aggregator for repos that DON'T already define `verify`. If the repo HAS a `verify`/`check`
  # task, delete this and instead add `lint:design` to that task's `deps:` so the design gate
  # runs as part of the normal verification pass.
  verify:design:
    desc: Design verification — repo checks then the static design gate (rendered check is manual)
    cmds:
      - task: lint:design
      - cmd: echo "Static gate green. Now run the app and measure RENDERED contrast in both themes — task verify:contrast (see accessibility-verification.md, Phase 5)."
        silent: true
